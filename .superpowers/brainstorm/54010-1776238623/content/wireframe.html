<h2>界面线框图</h2>
<p class="subtitle">左：今天（写作页） &nbsp;·&nbsp; 右：历史（列表页）</p>

<div class="split" style="gap:32px;align-items:flex-start;margin-top:24px;">

  <!-- TODAY VIEW -->
  <div class="mockup" style="flex:1;">
    <div class="mockup-header">今天</div>
    <div class="mockup-body" style="background:#faf9f6;padding:0;overflow:hidden;border-radius:0 0 8px 8px;">
      <div style="max-width:400px;margin:0 auto;padding:24px 20px 80px;font-family:Georgia,serif;">

        <!-- Header -->
        <div style="text-align:center;padding:16px 0 24px;">
          <div style="font-size:11px;color:#a09890;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;">感恩日记</div>
          <div style="font-size:22px;color:#2c2825;font-weight:400;">2026年4月15日</div>
          <div style="font-size:12px;color:#b0a89e;margin-top:4px;">星期三</div>
        </div>

        <!-- Divider -->
        <div style="border-top:1px solid #e8e2da;margin-bottom:20px;"></div>

        <!-- Prompt -->
        <div style="font-size:13px;color:#a09890;margin-bottom:10px;font-style:italic;">今天，我感恩...</div>

        <!-- Textarea -->
        <div style="background:#fff;border:1px solid #e0d9d0;border-radius:8px;padding:16px;min-height:180px;font-size:15px;color:#6b6259;line-height:1.8;position:relative;">
          <span style="color:#c4bdb5;">点击开始书写...</span>
          <div style="position:absolute;bottom:10px;right:12px;font-size:11px;color:#d0c9c0;">0 字</div>
        </div>

        <!-- Save button -->
        <div style="margin-top:16px;text-align:right;">
          <div class="mock-button" style="background:#8b7355;color:white;border:none;padding:10px 24px;border-radius:20px;font-size:13px;display:inline-block;">保存</div>
          <div style="font-size:11px;color:#c4bdb5;margin-top:6px;">3秒后自动保存</div>
        </div>

        <!-- Streak -->
        <div style="margin-top:24px;text-align:center;padding:12px;background:#f5f0e8;border-radius:8px;">
          <span style="font-size:13px;color:#8b7355;">🌱 已坚持 &nbsp;</span>
          <span style="font-size:18px;color:#5c4a30;font-weight:600;">12</span>
          <span style="font-size:13px;color:#8b7355;">&nbsp; 天</span>
        </div>
      </div>

      <!-- Bottom Nav -->
      <div style="position:sticky;bottom:0;background:#faf9f6;border-top:1px solid #e8e2da;display:flex;justify-content:center;gap:48px;padding:12px 0;">
        <div style="text-align:center;">
          <div style="font-size:18px;">✏️</div>
          <div style="font-size:10px;color:#8b7355;font-weight:600;margin-top:2px;">今天</div>
        </div>
        <div style="text-align:center;opacity:0.4;">
          <div style="font-size:18px;">📖</div>
          <div style="font-size:10px;color:#a09890;margin-top:2px;">历史</div>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY VIEW -->
  <div class="mockup" style="flex:1;">
    <div class="mockup-header">历史</div>
    <div class="mockup-body" style="background:#faf9f6;padding:0;overflow:hidden;border-radius:0 0 8px 8px;">
      <div style="max-width:400px;margin:0 auto;padding:24px 20px 80px;font-family:Georgia,serif;">

        <!-- Header -->
        <div style="text-align:center;padding:16px 0 20px;">
          <div style="font-size:11px;color:#a09890;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;">感恩日记</div>
          <div style="display:flex;align-items:center;justify-content:center;gap:16px;">
            <span style="color:#b0a89e;font-size:18px;cursor:pointer;">‹</span>
            <span style="font-size:18px;color:#2c2825;font-weight:400;">2026年4月</span>
            <span style="color:#b0a89e;font-size:18px;cursor:pointer;">›</span>
          </div>
        </div>

        <div style="border-top:1px solid #e8e2da;margin-bottom:16px;"></div>

        <!-- Entry Cards -->
        <div style="display:flex;flex-direction:column;gap:12px;">

          <div style="background:#fff;border:1px solid #e8e2da;border-radius:8px;padding:14px 16px;">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
              <span style="font-size:12px;color:#a09890;letter-spacing:1px;">4月15日 · 星期三</span>
              <span style="font-size:10px;color:#c4bdb5;">今天</span>
            </div>
            <p style="font-size:14px;color:#5c4a30;line-height:1.6;margin:0;display:-webkit-box;-webkit-line-clamp:2;overflow:hidden;">早晨的阳光透过窗帘，咖啡的香气，还有一封来自朋友的消息。</p>
          </div>

          <div style="background:#fff;border:1px solid #e8e2da;border-radius:8px;padding:14px 16px;">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
              <span style="font-size:12px;color:#a09890;letter-spacing:1px;">4月14日 · 星期二</span>
            </div>
            <p style="font-size:14px;color:#5c4a30;line-height:1.6;margin:0;display:-webkit-box;-webkit-line-clamp:2;overflow:hidden;">完成了一个拖延了很久的项目，晚上吃到了很好吃的火锅。</p>
          </div>

          <div style="background:#fff;border:1px solid #e8e2da;border-radius:8px;padding:14px 16px;opacity:0.7;">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
              <span style="font-size:12px;color:#a09890;letter-spacing:1px;">4月12日 · 星期日</span>
            </div>
            <p style="font-size:14px;color:#5c4a30;line-height:1.6;margin:0;display:-webkit-box;-webkit-line-clamp:2;overflow:hidden;">和家人视频聊了很久，心里暖暖的。</p>
          </div>

          <div style="text-align:center;padding:8px 0;">
            <span style="font-size:12px;color:#c4bdb5;">共 12 条记录</span>
          </div>
        </div>

      </div>

      <!-- Bottom Nav -->
      <div style="position:sticky;bottom:0;background:#faf9f6;border-top:1px solid #e8e2da;display:flex;justify-content:center;gap:48px;padding:12px 0;">
        <div style="text-align:center;opacity:0.4;">
          <div style="font-size:18px;">✏️</div>
          <div style="font-size:10px;color:#a09890;margin-top:2px;">今天</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:18px;">📖</div>
          <div style="font-size:10px;color:#8b7355;font-weight:600;margin-top:2px;">历史</div>
        </div>
      </div>
    </div>
  </div>

</div>
